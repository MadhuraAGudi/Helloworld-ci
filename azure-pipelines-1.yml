trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    steps:
    - script: echo "Simulating Application Build..."
      displayName: 'Simulate Application Build'

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    # This links the exact Variable Group you created in Step 11/12
    variables:
    - group: 'New-variable-group-23-May'
    steps:
    - script: |
        echo "Starting continuous deployment flow..."
        echo "Connecting to target Azure App Service environment..."
        echo "Validating infrastructure variables..."
        
        # Testing Key Vault mapping: Azure will mask the value automatically for safety
        echo "Successfully fetched DB_PASSWORD from Key Vault simulation: $(DB_PASSWORD)"
        
        echo "Deployment script execution complete!"
      displayName: 'Simulate Deployment Task'