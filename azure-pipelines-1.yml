trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    steps:
    - script: echo "Simulating Application Build..."
      displayName: 'Simulate Application Build'

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    variables:
      DB_PASSWORD: 'MySecurePassword123'
    steps:
    - script: |
        echo "Starting simulated deployment flow..."
        echo "Connecting to simulated Azure Environment..."
        echo "Checking configurations..."
        echo "The database password variable is safely loaded."
        echo "Deploying application successfully to Azure App Service simulation!"
      displayName: 'Simulate Deployment Script'