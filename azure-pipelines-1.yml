trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    steps:
    - script: echo "Simulating Application Build..."
      displayName: 'Simulate Application Build'

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    # This is where your Variable Group will connect later!
    variables:
    - group: 'New-variable-group-23-May' 
    
    steps:
    - script: |
        echo "Starting simulated deployment flow..."
        echo "Connecting to simulated Azure Environment..."
        echo "Deploying application successfully!"
      displayName: 'Simulate Deployment Script'