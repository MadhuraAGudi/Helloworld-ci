trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    steps:
    - script: echo "Simulating Application Build..."
      displayName: 'Simulate Application Build'

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    variables:
    - group: 'New variable group 23-May' 
    
    steps:
    - script: |
        echo "Starting simulated deployment flow..."
        echo "Connecting to simulated Azure Environment..."
        echo "Checking secrets from Key Vault simulation..."
        
        # This will safely verify if the secret group is connected. 
        # Azure DevOps will automatically mask the output as '***' in logs for security!
        echo "The database password secret is: $(DB_PASSWORD)"
        
        echo "Deploying application successfully with secure configurations!"
      displayName: 'Simulate Deployment with Secrets'